name: Build libvoicetts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true

    - name: Install dependencies
      run: |
        sudo apt-get update -q
        sudo apt-get install -y cmake make autoconf automake libtool \
          libpcaudio-dev libsonic-dev pkg-config

    - name: Clone eSpeak-NG (no LFS needed)
      run: |
        git clone --depth=1 https://github.com/espeak-ng/espeak-ng.git jni/espeak-ng

    - name: Build eSpeak-NG host tool + generate phondata
      run: |
        cd jni/espeak-ng
        # Build host espeak-ng (Ubuntu x86_64) untuk generate data
        cmake -B build_host \
          -DUSE_ASYNC=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DESPEAK_NG_DEFAULT_VOICE=id \
          .
        cmake --build build_host -j4
        # Generate semua phoneme data (phondata, phonindex, phontab, intonations, dll)
        echo "=== Compile all phoneme data ==="
        cmake --build build_host --target espeak-ng-data || true
        # Fallback: jalankan manual
        if [ ! -f espeak-ng-data/phondata ]; then
          echo "Fallback: compile manual"
          ESPEAK_DATA_PATH=$(pwd)/espeak-ng-data \
            build_host/src/espeak-ng --compile-all 2>/dev/null || true
        fi
        echo "=== Hasil espeak-ng-data ==="
        ls -lh espeak-ng-data/
        echo "phondata: $(wc -c < espeak-ng-data/phondata 2>/dev/null || echo MISSING)"

    - name: Copy config.h into espeak-ng src
      run: cp jni/config.h jni/espeak-ng/src/config.h

    - name: Generate Android.mk
      run: python3 gen_mk.py

    - name: Build with NDK
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        $ANDROID_NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Collect output
      run: |
        mkdir -p out/espeak-ng-data
        find libs/ -name "*.so" -exec cp {} out/ \;
        cp -r jni/espeak-ng/espeak-ng-data/. out/espeak-ng-data/
        echo "=== Artifact contents ==="
        ls -lh out/
        ls -lh out/espeak-ng-data/ | head -20
        echo "phondata: $(wc -c < out/espeak-ng-data/phondata 2>/dev/null || echo MISSING)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libvoicetts-armeabi-v7a
        path: out/
