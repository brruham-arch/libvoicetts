name: Build libvoicetts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true

    - name: Install dependencies
      run: sudo apt-get install -y cmake make libpcaudio-dev libsonic-dev pkg-config

    - name: Clone eSpeak-NG
      run: git clone --depth=1 https://github.com/espeak-ng/espeak-ng.git jni/espeak-ng

    - name: Build eSpeak-NG host (cmake generates phondata otomatis)
      run: |
        cd jni/espeak-ng
        cmake -B build_host \
          -DUSE_ASYNC=OFF \
          -DBUILD_SHARED_LIBS=OFF \
          -DESPEAK_NG_DEFAULT_VOICE=id \
          .
        # Full build: cmake akan compile phondata sebagai bagian dari build
        cmake --build build_host -j4
        # Cari phondata di mana saja
        echo "=== Find phondata ==="
        find build_host -name "phondata" 2>/dev/null || echo "not in build_host"
        find . -name "phondata" 2>/dev/null | head -5

    - name: Copy phondata ke espeak-ng-data source tree
      run: |
        cd jni/espeak-ng
        # phondata ada di build_host/espeak-ng-data/
        PHDATA=$(find build_host -name "phondata" 2>/dev/null | head -1)
        if [ -n "$PHDATA" ]; then
          PHDIR=$(dirname "$PHDATA")
          echo "Found phondata at: $PHDIR"
          wc -c "$PHDATA"
          cp -r "$PHDIR"/. espeak-ng-data/
        else
          echo "ERROR: phondata tidak ditemukan di build output!"
          exit 1
        fi
        echo "=== espeak-ng-data ==="
        ls -lh espeak-ng-data/

    - name: Copy config.h
      run: cp jni/config.h jni/espeak-ng/src/config.h

    - name: Generate Android.mk
      run: python3 gen_mk.py

    - name: Build with NDK
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        $ANDROID_NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Collect output
      run: |
        mkdir -p out/espeak-ng-data
        find libs/ -name "*.so" -exec cp {} out/ \;
        cp -r jni/espeak-ng/espeak-ng-data/. out/espeak-ng-data/
        echo "phondata: $(wc -c < out/espeak-ng-data/phondata)"
        ls -lh out/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libvoicetts-armeabi-v7a
        path: out/
