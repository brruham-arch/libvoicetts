name: Build libvoicetts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true

    - name: Install dependencies
      run: sudo apt-get install -y cmake make libpcaudio-dev libsonic-dev pkg-config

    - name: Clone eSpeak-NG
      run: git clone --depth=1 https://github.com/espeak-ng/espeak-ng.git jni/espeak-ng

    - name: Build eSpeak-NG host binary
      run: |
        cd jni/espeak-ng
        cmake -B build_host -DUSE_ASYNC=OFF -DBUILD_SHARED_LIBS=OFF .
        cmake --build build_host -j4
        echo "Binary: $(ls -lh build_host/src/espeak-ng 2>/dev/null || echo MISSING)"

    - name: Generate phondata dari phsource/
      run: |
        cd jni/espeak-ng
        # phsource/ ada di repo (bukan LFS), compile jadi binary phondata
        ESPEAK_DATA_PATH=$(pwd)/espeak-ng-data \
          build_host/src/espeak-ng --compile-all
        echo "=== phondata size ==="
        wc -c espeak-ng-data/phondata
        ls -lh espeak-ng-data/

    - name: Copy config.h
      run: cp jni/config.h jni/espeak-ng/src/config.h

    - name: Generate Android.mk
      run: python3 gen_mk.py

    - name: Build with NDK
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        $ANDROID_NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Collect output
      run: |
        mkdir -p out/espeak-ng-data
        find libs/ -name "*.so" -exec cp {} out/ \;
        cp -r jni/espeak-ng/espeak-ng-data/. out/espeak-ng-data/
        echo "=== Artifact ==="
        ls -lh out/
        echo "phondata: $(wc -c < out/espeak-ng-data/phondata)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libvoicetts-armeabi-v7a
        path: out/
