name: Build libvoicetts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true

    - name: Clone eSpeak-NG + pull LFS data
      run: |
        sudo apt-get install -y git-lfs
        git clone --depth=1 https://github.com/espeak-ng/espeak-ng.git jni/espeak-ng
        cd jni/espeak-ng
        git lfs pull
        # Verify binary data ada (bukan LFS pointer 14 bytes)
        echo "phondata size: $(wc -c < espeak-ng-data/phondata 2>/dev/null || echo MISSING)"

    - name: Build eSpeak-NG host + compile Indonesian dict
      run: |
        sudo apt-get install -y libpcaudio-dev libsonic-dev ronn kramdown make
        cd jni/espeak-ng
        ./autogen.sh || true
        ./configure --without-async --without-mbrola --without-pcaudiolib 2>/dev/null || true
        make -j4 src/espeak-ng 2>/dev/null || true
        # Kalau build berhasil, compile dict id
        if [ -f src/espeak-ng ]; then
          echo "Host build OK, compile id dict..."
          ESPEAK_DATA_PATH=$(pwd)/espeak-ng-data src/espeak-ng --compile=id 2>/dev/null || true
        else
          echo "Host build skip, pakai data dari LFS"
        fi

    - name: Copy config.h into espeak-ng src
      run: cp jni/config.h jni/espeak-ng/src/config.h

    - name: Generate Android.mk
      run: python3 gen_mk.py

    - name: Build with NDK
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        $ANDROID_NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Collect output
      run: |
        mkdir -p out/espeak-ng-data
        find libs/ -name "*.so" -exec cp {} out/ \;
        cp -r jni/espeak-ng/espeak-ng-data/. out/espeak-ng-data/
        # Verify isi artifact
        echo "=== out/ ==="
        ls -lh out/
        echo "=== out/espeak-ng-data/ (top level) ==="
        ls -lh out/espeak-ng-data/
        echo "phondata size: $(wc -c < out/espeak-ng-data/phondata)"

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libvoicetts-armeabi-v7a
        path: out/
