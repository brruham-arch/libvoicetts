name: Build libvoicetts

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      id: setup-ndk
      with:
        ndk-version: r25b
        add-to-path: true

    - name: Clone eSpeak-NG
      run: git clone --depth=1 https://github.com/espeak-ng/espeak-ng.git jni/espeak-ng

    - name: Build eSpeak-NG host + compile Indonesian dict
      run: |
        sudo apt-get install -y libpcaudio-dev make
        cd jni/espeak-ng
        cmake -B build_host -DUSE_ASYNC=OFF -DBUILD_SHARED_LIBS=OFF .
        cmake --build build_host --target espeak-ng -j4 || true
        if [ -f build_host/src/espeak-ng ]; then
          ESPEAK_DATA_PATH=$(pwd)/espeak-ng-data build_host/src/espeak-ng --compile=id 2>/dev/null || true
        fi

    - name: Copy config.h into espeak-ng src
      run: cp jni/config.h jni/espeak-ng/src/config.h

    - name: Generate Android.mk
      run: python3 gen_mk.py

    - name: Build with NDK
      env:
        ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
      run: |
        $ANDROID_NDK/ndk-build NDK_PROJECT_PATH=. \
          APP_BUILD_SCRIPT=jni/Android.mk \
          NDK_APPLICATION_MK=jni/Application.mk \
          -j4

    - name: Collect output
      run: |
        mkdir -p out/espeak-ng-data
        find libs/ -name "*.so" -exec cp {} out/ \;
        cp -r jni/espeak-ng/espeak-ng-data/. out/espeak-ng-data/ 2>/dev/null || true
        ls -lh out/

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: libvoicetts-armeabi-v7a
        path: out/
